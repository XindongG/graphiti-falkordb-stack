server:
  transport: "http"
  host: "0.0.0.0"
  port: 8000

llm:
  provider: ${LLM_PROVIDER:anthropic}
  model: ${LLM_MODEL:doubao-seed-2.0-code}
  temperature: ${LLM_TEMPERATURE:0}
  max_tokens: ${LLM_MAX_TOKENS:4096}
  providers:
    anthropic:
      api_key: ${ANTHROPIC_API_KEY}
      api_url: ${ANTHROPIC_API_URL:https://ark.cn-beijing.volces.com/api/coding}
    openai:
      api_key: ${OPENAI_API_KEY}
      api_url: ${OPENAI_API_URL:https://api.openai.com/v1}
      organization_id: ${OPENAI_ORGANIZATION_ID:}

embedder:
  provider: ${EMBEDDER_PROVIDER:openai}
  model: ${EMBEDDER_MODEL:doubao-embedding-vision}
  dimensions: ${EMBEDDER_DIMENSIONS:2048}
  providers:
    openai:
      api_key: ${OPENAI_EMBEDDING_API_KEY}
      api_url: ${OPENAI_EMBEDDING_API_URL:https://ark.cn-beijing.volces.com/api/coding/v3}
      organization_id: ${OPENAI_EMBEDDING_ORGANIZATION_ID:}

database:
  provider: "falkordb"
  providers:
    falkordb:
      uri: ${FALKORDB_URI:redis://falkordb:6379}
      password: ${FALKORDB_PASSWORD:}
      database: ${FALKORDB_DATABASE:agent_memory}

graphiti:
  group_id: ${GRAPHITI_GROUP_ID:main}
  episode_id_prefix: ${EPISODE_ID_PREFIX:}
  user_id: ${USER_ID:mcp_user}
  entity_types:
    - name: "Preference"
      description: "User preferences, choices, opinions, or selections."
    - name: "Requirement"
      description: "Specific needs, features, or functionality that must be fulfilled."
    - name: "Procedure"
      description: "Standard operating procedures and sequential instructions."
    - name: "Location"
      description: "Physical or virtual places where activities occur."
    - name: "Event"
      description: "Time-bound activities, occurrences, or experiences."
    - name: "Organization"
      description: "Companies, institutions, groups, or formal entities."
    - name: "Document"
      description: "Information content in various forms."
    - name: "Topic"
      description: "Subject of conversation, interest, or knowledge domain."
    - name: "Object"
      description: "Physical items, tools, devices, or possessions."
